name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test tools
        run: python -m pip install --upgrade pip && python -m pip install -e '.[test]'
      - name: Compile package
        run: python -m compileall -q src tests examples
      - name: Run tests and fuzz properties
        run: python -m pytest -q
      - name: Smoke test installed CLI
        run: tiny-router --version && tiny-router init --output /tmp/router.json
      - name: Check whitespace errors
        run: git diff --check

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check and build Astro docs
        run: pnpm build
